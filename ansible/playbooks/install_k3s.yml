---
# Requires: ansible-galaxy collection install community.docker
- name: Install K3s on VM
  hosts: all
  become: true

  tasks:
    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      command: k3s kubectl get nodes
      register: nodes_output
      until: nodes_output.rc == 0
      retries: 10
      delay: 10

    - name: Get kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /tmp/k3s-kubeconfig.yaml
        flat: true

    - name: Create Docker registry secret for K3s
      shell: |
        k3s kubectl create secret docker-registry acr-secret \
          --docker-server={{ acr_server }} \
          --docker-username={{ acr_username }} \
          --docker-password={{ acr_password }} \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      vars:
        acr_server: "devopslabacrtf01.azurecr.io"
