name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      APP_NAME: devops-lab-app
      RESOURCE_GROUP: devops-lab-rg-tf

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure containerapp CLI extension
        run: az extension add --name containerapp --only-show-errors

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_LOGIN_SERVER }} \
            --image devops-lab:${{ github.sha }} \
            ./app

      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/devops-lab:${{ github.sha }}

      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          sleep 30
          curl -f "https://$APP_URL/health"
